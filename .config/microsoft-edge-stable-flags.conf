# ============================================================================
# Microsoft Edge: aceleracion de video en Wayland.
# Especifico de laptop HIBRIDA Intel + NVIDIA. Si no usas Edge, este archivo
# se ignora (solo lo lee el lanzador de Edge). Borralo si no aplica.
# El lanzador del paquete AUR lee EXACTAMENTE este nombre: microsoft-edge-stable-flags.conf
# ============================================================================

# Forzar Wayland nativo (evita XWayland, causa frecuente de cuelgues/glitches en NVIDIA).
--ozone-platform-hint=auto

# Activar decodificacion de video por GPU (VA-API) en el camino GL de Linux.
# VaapiIgnoreDriverChecks fuerza el uso aunque el driver no este en la lista blanca.
--enable-features=VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks,AcceleratedVideoDecodeLinuxGL
