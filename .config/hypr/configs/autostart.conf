#################
### AUTOSTART ###
#################

xwayland {
  force_zero_scaling = true
}

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle
# Activa graphical-session.target para que los portales (xdg-desktop-portal)
# puedan arrancar via D-Bus. Los portales se activan bajo demanda; NO lanzarlos
# manualmente aqui (causaba conflicto de nombre D-Bus y rompia compartir pantalla).
exec-once = systemctl --user start hyprland-session.target
exec-once = sleep 1 && QT_QPA_PLATFORM=wayland qs

# set a random wallpaper at start and start hyprpaper
exec-once = awww-daemon & sleep 1; $HOME/.config/hypr/scripts/wallpapers/set-random.sh
