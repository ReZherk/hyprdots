#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


# Nvidia settings
# NOTA: esta config asume una laptop HIBRIDA Intel + NVIDIA.
# Decodificacion de video por la iGPU Intel (iHD): estable con VP9/AV1/H264
# y ahorra bateria. El driver VAAPI de NVIDIA (libva-nvidia-driver) causa
# videos negros y corrupcion de la ventana con ciertos codecs en navegadores.
# -> Si reinstalas en una maquina SIN Intel (solo AMD/NVIDIA), cambia o quita
#    esta linea (p.ej. AMD usa 'radeonsi', NVIDIA puro 'nvidia').
env = LIBVA_DRIVER_NAME,iHD
env = __GLX_VENDOR_LIBRARY_NAME,nvidia


