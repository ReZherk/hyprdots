################
### MONITORS ###
################

# HDMI externo a la izquierda, laptop a la derecha (según tu layout actual)
monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=eDP-1,1920x1080@144,1920x0,1

# Regla genérica para cualquier monitor nuevo
monitor=,preferred,auto,auto

# Si quieres espejar el externo en el laptop, descomenta:
# monitor=HDMI-A-1,preferred,auto,1,mirror,eDP-1

##################
### WORKSPACES ###
##################
# Workspaces 1-5 en el monitor externo (HDMI), 6-10 en el laptop (eDP).
# Si el externo no está conectado, estos workspaces caen automáticamente al laptop.
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:eDP-1, default:true
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1
